name: Build Android APK
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # ESTO GENERA LOS ARCHIVOS DEL WRAPPER QUE LE FALTAN A TU REPOSITORIO
    - name: Forzar Generacion de Gradle Wrapper
      run: gradle wrapper --gradle-version 8.0.2

    - name: Compilar APK con Gradle Wrapper
      run: ./gradlew assembleDebug

    - name: Subir Archivo APK
      uses: actions/upload-artifact@v4
      with:
        name: detector-ia-apk
        path: app/build/outputs/apk/debug/app-debug.apk
